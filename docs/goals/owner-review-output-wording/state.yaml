version: 2

goal:
  title: "KEIJI レビュー出力の文言改善"
  slug: "owner-review-output-wording"
  kind: specific
  tranche: "local_smoke のMarkdown文言を改善し、検証し、PR/push判断までowner向けボードを表示する。"
  status: done
  intake:
    original_request: "タスクボードに出しながら、local_smoke出力Markdownの文言修正をする。"
    interpreted_outcome: "非エンジニアownerが、生成Markdownを購入許可と誤解せず確認できる。"
    input_shape: specific
    audience: "KEIJI owner / 非エンジニア確認者"
    authority: approved
    proof_type: test
    completion_proof: "local_smoke PASS、unittest PASS、生成Markdownの安全文言改善、右側ボード表示。"
    likely_misfire: "依頼されたGoalBuddy風LIVEボードではなく、静的な簡易表だけを表示してしまう。"
    blind_spots_considered:
      - "BUY_CANDIDATE / TEST_BUY_CANDIDATE が購入許可に見える可能性。"
      - "purchase_candidate_created が購入承認に見える可能性。"
      - "追加リスク控除なしが、現実のリスクなしに見える可能性。"
      - "Codex確認補助文言が、CodexやKEIJIによる購入実行に見える可能性。"
    existing_plan_facts:
      - "offline-first / human-approval-first"
      - "購入、決済、出品、login、cart、checkout、browser automation、scraping、external agent API、live external API、外部通知は追加しない。"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/owner-review-output-wording/"
    command: "npx goalbuddy board docs/goals/owner-review-output-wording"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    objective: "local_smoke のMarkdown出力を確認し、ownerが迷いそうな文言リスクを洗い出す。"
    inputs:
      - "storage/smoke/pending_review.md"
      - "storage/smoke/p7_review_packets.md"
      - "storage/smoke/p8_review_handoff_packets.md"
      - "storage/smoke/status.md"
      - "storage/smoke/audit_log.md"
      - "docs/non_engineer_review_guide.md"
    constraints:
      - "読み取り専用。"
      - "外部操作なし。"
    expected_output:
      - "owner向け文言リスク"
      - "文言改善PRを作るべきかの判断"
    receipt:
      result: done
      summary: "文言リスクを確認。status/audit の安全注意が薄い、空の Reason が未完成に見える、True/False や human_review 0 が技術寄り、追加リスク控除なしがリスクなしに見える、Codex確認補助ラベルは非実行をより強める必要があると判断。"
      evidence:
        - "storage/smoke/pending_review.md"
        - "storage/smoke/p7_review_packets.md"
        - "storage/smoke/p8_review_handoff_packets.md"
        - "storage/smoke/status.md"
        - "storage/smoke/audit_log.md"
        - "docs/non_engineer_review_guide.md"

  - id: T002
    type: worker
    assignee: Worker
    status: done
    objective: "生成Markdown、ガイド、期待テストに文言改善だけを反映する。"
    allowed_files:
      - "src/keiji/io/review_report.py"
      - "src/keiji/review/export.py"
      - "src/keiji/review_handoff/export.py"
      - "src/keiji/io/status_report.py"
      - "src/keiji/io/audit_export.py"
      - "docs/non_engineer_review_guide.md"
      - "tests/integration/test_review_reports_and_cli.py"
      - "tests/integration/test_audit_export_and_smoke_cli.py"
      - "tests/integration/test_status_report_and_validation_cli.py"
      - "tests/integration/test_p4_to_p7_offline_flow.py"
      - "tests/integration/test_p7_to_p8_review_handoff_flow.py"
    verify:
      - "PYTHONPATH=src python scripts/local_smoke.py --out-dir storage/smoke"
      - "PYTHONPATH=src python -m unittest discover -s tests -v"
    stop_if:
      - "購入、決済、出品、login、cart、checkout、browser automation、scraping、external agent API、live external API、外部通知が必要になった場合。"
      - "owner承認なしにGitHub pushやPR作成が必要になった場合。"
    receipt:
      result: done
      changed_files:
        - "src/keiji/io/review_report.py"
        - "src/keiji/review/export.py"
        - "src/keiji/review_handoff/export.py"
        - "src/keiji/io/status_report.py"
        - "src/keiji/io/audit_export.py"
        - "docs/non_engineer_review_guide.md"
        - "tests/integration/test_review_reports_and_cli.py"
        - "tests/integration/test_audit_export_and_smoke_cli.py"
        - "tests/integration/test_status_report_and_validation_cli.py"
        - "tests/integration/test_p4_to_p7_offline_flow.py"
        - "tests/integration/test_p7_to_p8_review_handoff_flow.py"
      commands:
        - cmd: "PYTHONPATH=src python scripts/local_smoke.py --out-dir storage/smoke"
          status: pass
        - cmd: "PYTHONPATH=src python -m unittest discover -s tests -v"
          status: pass
      summary: "外部操作、購入、決済、出品、browser、scraping、external agent API、live API、通知機能を追加せず、owner向け生成Markdownの文言だけを改善。"

  - id: T003
    type: judge
    assignee: Judge
    status: done
    objective: "文言改善と生成smoke出力を検証する。"
    inputs:
      - "T002の作業記録"
      - "生成された storage/smoke Markdown"
      - "検証コマンド結果"
    constraints:
      - "実装しない。"
      - "購入側の操作を承認しない。"
    expected_output:
      - "検証結果"
      - "残リスク"
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      commands:
        - cmd: "PYTHONPATH=src python scripts/local_smoke.py --out-dir storage/smoke"
          status: pass
        - cmd: "PYTHONPATH=src python -m unittest discover -s tests -v"
          status: pass
        - cmd: "git diff --check"
          status: pass
      summary: "local_smoke PASS、全unittest 68件 PASS、対象integration unittest 6件 PASS、diff check PASS。pytest は現在のPython環境に未導入のため実行不可。依存追加はしていない。"

  - id: T004
    type: pm
    assignee: PM
    status: done
    objective: "このブランチをpushしてGitHub PRを作るか、Mitaさんの判断を待つ。"
    inputs:
      - "現在のブランチ owner-review-output-wording"
      - "T001-T003 の作業記録"
      - "現在の差分"
    constraints:
      - "明示承認なしにpushやPR作成をしない。"
      - "mainへmergeしない。"
    expected_output:
      - "owner判断: push/PRする、文言を追加調整する、ローカル保持する"
    receipt:
      result: done
      summary: "Mitaさんから「自身でチェックを行って大丈夫であれば、PRプッシュしていい」と明示承認あり。"

  - id: T005
    type: pm
    assignee: PM
    status: done
    objective: "Mitaさんが明示承認した場合だけ、ブランチをpushしてPRを作成する。"
    allowed_files: []
    verify:
      - "承認された場合、GitHub PR URL が存在する。"
    stop_if:
      - "owner承認がない。"
      - "mainへのpushやmergeが求められた。"
    receipt:
      result: done
      commands:
        - cmd: "git push -u origin owner-review-output-wording"
          status: pass
        - cmd: "gh pr create --repo fsywy020-ui/KEIJI --base main --head owner-review-output-wording"
          status: pass
      summary: "Mitaさんの明示承認後、ブランチをpushし、PR #13 を作成。"

  - id: T006
    type: pm
    assignee: PM
    status: done
    objective: "最終セルフチェックを行い、問題なければGitHubへpushしてPRを作成する。"
    inputs:
      - "Mitaさんの明示承認"
      - "現在の差分"
      - "local_smoke / unittest / diff check"
    constraints:
      - "mainへ直接pushしない。"
      - "mergeしない。"
      - "購入、決済、出品、login、cart、checkout、browser automation、scraping、external agent API、live external API、外部通知を実装・実行しない。"
    expected_output:
      - "セルフチェック結果"
      - "push結果"
      - "PR URL"
    receipt:
      result: done
      summary: "セルフチェック後にpushとPR作成を完了。PR URL: https://github.com/fsywy020-ui/KEIJI/pull/13"
      commands:
        - cmd: "PYTHONPATH=src python scripts/local_smoke.py --out-dir storage/smoke"
          status: pass
        - cmd: "PYTHONPATH=src python -m unittest discover -s tests -v"
          status: pass
        - cmd: "git diff --check"
          status: pass
      full_outcome_complete: false

  - id: T007
    type: pm
    assignee: PM
    status: done
    objective: "今回の依頼が完了しているか最終監査する。"
    inputs:
      - "T001-T006 の作業記録"
      - "PR #13"
      - "右側GoalBuddyボード"
    constraints:
      - "購入側の操作を承認しない。"
      - "mainへmergeしない。"
    expected_output:
      - "完了判定"
      - "残るowner判断"
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      summary: "日本語のGoalBuddy LIVEボードを表示し、文言改善を実装・検証し、owner承認後にPR #13 を作成した。残る判断はGitHub上でのレビュー/mergeのみ。"

  - id: T008
    type: pm
    assignee: PM
    status: done
    objective: "PR #13 の競合を解消し、再検証してPRブランチを更新する。"
    inputs:
      - "PR #13 mergeable: CONFLICTING"
      - "origin/main"
      - "owner-review-output-wording branch"
    constraints:
      - "mainへ直接pushしない。"
      - "mainへmergeしない。"
      - "購入、決済、出品、login、cart、checkout、browser automation、scraping、external agent API、live external API、外部通知を実装・実行しない。"
      - "Mitaさんや他AIの変更を勝手に戻さない。"
    expected_output:
      - "競合解消内容"
      - "検証結果"
      - "PR #13 更新結果"
    receipt:
      result: done
      summary: "origin/main を取り込み、STATUS.md と TASK_BOARD.md の競合を解消。main側のタスクボード導入記録と、このPR側のレビュー出力文言改善記録を両方残した。AGENTS.md のmain側タスクボード常時運用ルールも保持。"
      commands:
        - cmd: "git fetch origin main"
          status: pass
        - cmd: "git merge origin/main"
          status: resolved
        - cmd: "PYTHONPATH=src python scripts/local_smoke.py --out-dir storage/smoke"
          status: pass
        - cmd: "PYTHONPATH=src python -m unittest discover -s tests -v"
          status: pass
        - cmd: "git diff --check"
          status: pass

  - id: T009
    type: pm
    assignee: PM
    status: done
    objective: "競合解消コミットを作成し、PR #13 ブランチへpushする。"
    inputs:
      - "T008 receipt"
      - "resolved merge state"
      - "verification results"
    constraints:
      - "mainへ直接pushしない。"
      - "mainへmergeしない。"
      - "購入、決済、出品、login、cart、checkout、browser automation、scraping、external agent API、live external API、外部通知を実装・実行しない。"
    expected_output:
      - "commit result"
      - "push result"
      - "PR #13 mergeable status"
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      summary: "競合解消コミット 31eea14 を作成して owner-review-output-wording ブランチへpush。PR #13 は OPEN のまま、mergeable: MERGEABLE に戻った。GitHub Actions は Python 3.11 / 3.12 のoffline test suiteが実行中。mainへのmergeは未実施。"
      commands:
        - cmd: "git commit -m \"main取り込みの競合を解消\""
          status: pass
        - cmd: "git push"
          status: pass
        - cmd: "gh pr view 13 --repo fsywy020-ui/KEIJI --json number,title,url,state,mergeable,statusCheckRollup,headRefName,baseRefName"
          status: pass

  - id: T010
    type: pm
    assignee: PM
    status: done
    objective: "Mitaさん承認済みのPR #13をmainへマージする。"
    inputs:
      - "Mitaさんの明示承認: マージしてOK"
      - "PR #13 mergeable: MERGEABLE"
      - "Python 3.11 / 3.12 offline test suite: SUCCESS"
    constraints:
      - "mainへ直接pushしない。"
      - "購入、決済、出品、login、cart、checkout、browser automation、scraping、external agent API、live external API、外部通知を実装・実行しない。"
      - "PR #13 のマージ以外の外部公開・release・tag作成はしない。"
    expected_output:
      - "merge result"
      - "PR #13 final state"
      - "main反映確認"
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      summary: "Mitaさん承認後、PR #13 をmainへマージした。PR #13 は MERGED、merge commit は a58b943c11f83d08361c7cb5c734df598a3dbc64。origin/main も同じコミットへ更新確認済み。"
      commands:
        - cmd: "gh pr merge 13 --repo fsywy020-ui/KEIJI --merge"
          status: pass
        - cmd: "gh pr view 13 --repo fsywy020-ui/KEIJI --json number,title,url,state,mergedAt,mergeCommit,headRefName,baseRefName"
          status: pass
        - cmd: "git fetch origin main && git rev-parse origin/main"
          status: pass

checks:
  dirty_fingerprint: "local wording diff present"
  last_verification:
    result: pass
    task: T010
    commands:
      - "PYTHONPATH=src python scripts/local_smoke.py --out-dir storage/smoke"
      - "PYTHONPATH=src python -m unittest discover -s tests -v"
      - "git diff --check"
      - "git push"
      - "gh pr view 13 --repo fsywy020-ui/KEIJI --json number,title,url,state,mergeable,statusCheckRollup,headRefName,baseRefName"
      - "gh pr merge 13 --repo fsywy020-ui/KEIJI --merge"
      - "gh pr view 13 --repo fsywy020-ui/KEIJI --json number,title,url,state,mergedAt,mergeCommit,headRefName,baseRefName"
